  - id: Zhao
    label: Zhao 2019
    model_path: models/oral/Pesticides/Zhao/Zhao.sbml
    param_file: models/oral/Pesticides/Zhao/Zhao.params.csv
    target_mappings:
      Oral: AGut
      ABlood: ABlood
      CBlood: '[ABlood]'
  - id: Zwartsen
    label: Zwartsen 2025
    model_path: models/oral/Pesticides/Zwartsen/Zwartsen.sbml
    param_file: models/oral/Pesticides/Zwartsen/Zwartsen.params.csv
    target_mappings:
      Oral: ASL
      ABlood: ABlood
      CBlood: '[ABlood]'

scenarios:
  - id: CPS_scenario_1
    label: Chlorpyrifos Scenario 1
    duration: 100
    evaluation_resolution: 24
    time_unit: DAY
    amount_unit: MILLIGRAMS
    molar_mass: 305.59
    parameters:
        BW: 60
    dosing_events:
      - type: repeated_bolus
        target: Oral
        amount: 30
        time: 0
        interval: 1
    outputs:
      - id: ABlood
        label: Amount in Blood
        output: ABlood
      - id: CBlood
        label: Concentration in Blood
        output: CBlood
