id: CPS
label: CPS
model_instances:
  - id: Timchalk
    label: Timchalk 2002
    model_path: models/oral/Pesticides/Timchalk/Timchalk.sbml
    param_file: models/oral/Pesticides/Timchalk/Timchalk.params.csv
    target_mappings:
      Oral: ALiver
      ABlood: ABlood
      CBlood: '[ABlood]'
#  - id: Bouchard
