scenarios:
  - id: Cadmium_scenario_1
    label: Cadmium Scenario 1
    duration: 100
    evaluation_resolution: 24
    time_unit: DAY
    amount_unit: MILLIGRAMS
    molar_mass: 112.411
    parameters:
        BW: 60
    dosing_events:
      - type: repeated_bolus
        target: Oral
        amount: 4.285714286
        time: 0
        interval: 1
    outputs:
      - id: APlasma
        label: Amount in Plasma
        output: APlasma
      - id: CPlasma
        label: Concentration in Plasma
        output: CPlasma
