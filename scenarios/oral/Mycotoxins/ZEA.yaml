id: ZEA
label: ZEA
model_instances:
  - id: Mendez_Catala
    label: Mendez_Catala 2021
    model_path: models/oral/Mycotoxins/Mendez_Catala/Mendez_Catala.sbml
    param_file: models/oral/Mycotoxins/Mendez_Catala/Mendez_Catala.params.csv
    target_mappings:
      Oral: ASt
      ABlood: ABlood
      CBlood: '[ABlood]'
  - id: Mukherjee
    label: Mukherjee 2014
    model_path: models/oral/Mycotoxins/Mukherjee/Mukherjee.sbml
    param_file: models/oral/Mycotoxins/Mukherjee/Mukherjee.params.csv
    target_mappings:
      Oral: AGILumen
      ABlood: ABlood
      CBlood: '[ABlood]'

scenarios:
  - id: ZEA_scenario_1
    label: ZEA Scenario 1
    duration: 10
    evaluation_resolution: 24
    time_unit: DAY
    amount_unit: MILLIGRAMS
    molar_mass: 318.37
    parameters:
        BW: 60
    dosing_events:
      - type: repeated_bolus
        target: Oral
        amount: 480
        time: 0
        interval: 1
    outputs:
      - id: ABlood
        label: Amount in Blood
        output: ABlood
      - id: CBlood
        label: Concentration in Blood
        output: CBlood
  - id: ZEA_scenario_2
    label: ZEA Scenario 2
    duration: 10
    evaluation_resolution: 24
    time_unit: DAY
    amount_unit: MILLIGRAMS
    molar_mass: 318.37
    parameters:
        BW: 60
    dosing_events:
      - type: repeated_bolus
        target: Oral
        amount: 4800
        time: 0
        interval: 1
    outputs:
      - id: ABlood
        label: Amount in Blood
        output: ABlood
      - id: CBlood
        label: Concentration in Blood
        output: CBlood
