scenarios:
  - id: BPA_scenario_1
    label: BPA Scenario 1
    duration: 10
    evaluation_resolution: 24
    time_unit: DAY
    amount_unit: MILLIGRAMS
    molar_mass: 228.3
    parameters:
        BW: 60
    dosing_events:
      - type: repeated_bolus
        target: Oral
        amount: 6
        time: 0
        interval: 1
    outputs:
      - id: ABlood
        label: Amount in Blood
        output: ABlood
      - id: CBlood
        label: Concentration in Blood
        output: CBlood
