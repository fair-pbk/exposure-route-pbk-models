unit_consistency:
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <initialAssignment> <math> expression '20 / 1000' cannot be fully checked. Unit\
    \ consistency reported as either no errors or further unit errors related to this\
    \ object may not be accurate."
- level: error
  msg: "When the 'variable' in an <assignmentRule> refers to a <compartment>, the\
    \ units of the rule's right-hand side are expected to be consistent with the units\
    \ of that compartment's size. \nReference: L3V2 Section 4.9.3\n  Expected units\
    \ are litre (exponent = 1, multiplier = 1, scale = 0) but the units returned by\
    \ the <math> expression of the <assignmentRule> with variable 'Urine' are litre\
    \ (exponent = 1, multiplier = 1, scale = 0), second (exponent = -1, multiplier\
    \ = 3600, scale = 0)."
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <assignmentRule> <math> expression 'VUrineC * BW / 24' cannot be fully checked.\
    \ Unit consistency reported as either no errors or further unit errors related\
    \ to this object may not be accurate."
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <assignmentRule> <math> expression 'BW * (0.84 - VLc - VGITissuec) - VPlasma'\
    \ cannot be fully checked. Unit consistency reported as either no errors or further\
    \ unit errors related to this object may not be accurate."
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <assignmentRule> <math> expression 'QC * (1 - Hct)' cannot be fully checked.\
    \ Unit consistency reported as either no errors or further unit errors related\
    \ to this object may not be accurate."
- level: error
  msg: "When the 'variable' in an <assignmentRule> refers to a <parameter>, the units\
    \ of the rule's right-hand side are expected to be consistent with the units declared\
    \ for that parameter. \nReference: L3V2 Section 4.9.3\n  Expected units are litre\
    \ (exponent = 1, multiplier = 1, scale = 0), second (exponent = -1, multiplier\
    \ = 3600, scale = 0) but the units returned by the <math> expression of the <assignmentRule>\
    \ with variable 'CLintL' are litre (exponent = 2, multiplier = 1, scale = 0),\
    \ second (exponent = -1, multiplier = 3600, scale = 0), gram (exponent = -1, multiplier\
    \ = 1, scale = 3)."
