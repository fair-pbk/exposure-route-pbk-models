      iri: http://purl.obolibrary.org/obo/CHEBI_33216
unit_consistency:
- level: error
  msg: In situations where a mathematical expression refers to extent, the units of
    extent should be consistent with the global extent units of the model. In models
    where the 'extentUnits' attribute has not been declared, libSBML does not yet
    have the functionality to verify accurately the consistency of the units in such
    expressions.
- level: error
  msg: "The units of the expressions used as arguments to a function call are expected\
    \ to match the units expected for the arguments of that function. \nReference:\
    \ L3V2 Section 3.4\n The formula 'CGut * fup + KmGMet1' in the math element of\
    \ the <kineticLaw> can only act on variables with the same units."
- level: error
  msg: "The units of the expressions used as arguments to a function call are expected\
    \ to match the units expected for the arguments of that function. \nReference:\
    \ L3V2 Section 3.4\n The formula 'CLiver * fup + KmLMet1' in the math element\
    \ of the <kineticLaw> can only act on variables with the same units."
- level: error
  msg: "The units of the expressions used as arguments to a function call are expected\
    \ to match the units expected for the arguments of that function. \nReference:\
    \ L3V2 Section 3.4\n The formula 'CLiver * fup + KmLMet2' in the math element\
    \ of the <kineticLaw> can only act on variables with the same units."
- level: error
  msg: "The unit of measurement associated with the mathematical formula in the MathML\
    \ math element of every KineticLaw object in a model should be identical to all\
    \ KineticLaw objects in the model.\nReference: L3V2 Section 3.4\n The formula\
    \ 'VmaxGMet1 * CGut * fup / (CGut * fup + KmGMet1)' in the <kineticLaw> element\
    \ of the <reaction> with id '_J3' produces units that are inconsistent with units\
    \ of earlier KineticLaw elements."
- level: error
  msg: "The unit of measurement associated with the mathematical formula in the MathML\
    \ math element of every KineticLaw object in a model should be identical to all\
    \ KineticLaw objects in the model.\nReference: L3V2 Section 3.4\n The formula\
    \ 'VmaxLMet1 * CLiver * fup / (CLiver * fup + KmLMet1)' in the <kineticLaw> element\
    \ of the <reaction> with id '_J8' produces units that are inconsistent with units\
    \ of earlier KineticLaw elements."
- level: error
  msg: "The unit of measurement associated with the mathematical formula in the MathML\
