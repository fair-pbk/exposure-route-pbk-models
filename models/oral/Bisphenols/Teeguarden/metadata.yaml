- level: error
  msg: "The unit of measurement associated with the mathematical formula in the MathML\
    \ math element of every KineticLaw object in a model should be identical to all\
    \ KineticLaw objects in the model.\nReference: L3V2 Section 3.4\n The formula\
    \ 'BileFrac * ALiverMet' in the <kineticLaw> element of the <reaction> with id\
    \ '_J7' produces units that are inconsistent with units of earlier KineticLaw\
    \ elements.\n"
- level: error
  msg: "In situations where a mathematical expression refers to a compartment, species\
    \ or parameter, it is necessary to know the units of the object to establish unit\
    \ consistency. In models where the units of an object have not been declared,\
    \ libSBML does not yet have the functionality to accurately verify the consistency\
    \ of the units in mathematical expressions referring to that object. \n The units\
    \ of the <parameter> 'kabsMet1C' cannot be fully checked. Unit consistency reported\
    \ as either no errors or further unit errors related to this object may not be\
    \ accurate.\n"
