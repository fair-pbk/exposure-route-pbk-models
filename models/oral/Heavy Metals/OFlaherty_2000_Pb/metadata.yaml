unit_consistency:
- level: error
  msg: "In situations where a mathematical expression refers to extent, the units\
    \ of extent should be consistent with the global extent units of the model. In\
    \ models where the 'extentUnits' attribute has not been declared, libSBML does\
    \ not yet have the functionality to verify accurately the consistency of the units\
    \ in such expressions. \n"
- level: error
  msg: "The units of the expressions used as arguments to a function call are expected\
    \ to match the units expected for the arguments of that function. \nReference:\
    \ L3V2 Section 3.4\n The formula 'BW - VL' in the math element of the <assignmentRule>\
    \ can only act on variables with the same units.\n"
- level: error
  msg: "When the 'variable' in an <assignmentRule> refers to a <parameter>, the units\
    \ of the rule's right-hand side are expected to be consistent with the units declared\
    \ for that parameter. \nReference: L3V2 Section 4.9.3\n  Expected units are litre\
    \ (exponent = 1, multiplier = 1, scale = 0) but the units returned by the <math>\
    \ expression of the <assignmentRule> with variable 'VRest' are indeterminable.\n"
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <assignmentRule> <math> expression '340 * BW / 24' cannot be fully checked.\
    \ Unit consistency reported as either no errors or further unit errors related\
    \ to this object may not be accurate.\n"
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <assignmentRule> <math> expression 'piecewise(0.52 + Age * 14, lt(Age, 0.01),\
    \ HtcA * (1 + (0.66 - HtcA) * exp(-(Age - 0.01) * 13.9)))' cannot be fully checked.\
    \ Unit consistency reported as either no errors or further unit errors related\
    \ to this object may not be accurate.\n"
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <assignmentRule> <math> expression '2.7 * 1000' cannot be fully checked. Unit\
    \ consistency reported as either no errors or further unit errors related to this\
    \ object may not be accurate.\n"
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <assignmentRule> <math> expression '0.0075 * 1000' cannot be fully checked.\
    \ Unit consistency reported as either no errors or further unit errors related\
    \ to this object may not be accurate.\n"
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <kineticLaw> <math> expression 'QL * (1 - Htc) * (ALiver / (VL * PL)) + Htc\
    \ * (ALiver / (VL * PL)) * (G + BIND / (KBIND + ALiver / (VL * PL)))' cannot be\
    \ fully checked. Unit consistency reported as either no errors or further unit\
    \ errors related to this object may not be accurate.\n"
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <kineticLaw> <math> expression 'QRest * (1 - Htc) * (ARest / (VRest * PRest))\
    \ + Htc * (ARest / (VRest * PRest)) * (G + BIND / (KBIND + ARest / (VRest * PRest)))'\
    \ cannot be fully checked. Unit consistency reported as either no errors or further\
    \ unit errors related to this object may not be accurate.\n"
