- level: error
  msg: "When the 'variable' in an <assignmentRule> refers to a <parameter>, the units\
    \ of the rule's right-hand side are expected to be consistent with the units declared\
    \ for that parameter. \nReference: L3V2 Section 4.9.3\n  Expected units are gram\
    \ (exponent = 1, multiplier = 1, scale = -3), litre (exponent = -1, multiplier\
    \ = 1, scale = 0) but the units returned by the <math> expression of the <assignmentRule>\
    \ with variable 'CLI1' are dimensionless (exponent = 1, multiplier = 1e-06, scale\
    \ = 0).\n"
