unit_consistency:
- level: warning
  msg: "As a principle of best modeling practice, the size of a <compartment> should\
    \ be set to a value rather than be left undefined. Doing so improves the portability\
    \ of models between different simulation and analysis systems, and helps make\
    \ it easier to detect potential errors in models.\n The <compartment> with the\
    \ id 'IntestinalTissue' does not have a 'size' attribute, nor is its initial value\
    \ set by an <initialAssignment> or <assignmentRule>.\n"
- level: warning
  msg: "As a principle of best modeling practice, the <species> should set an initial\
    \ value (amount or concentration) rather than be left undefined. Doing so improves\
    \ the portability of models between different simulation and analysis systems,\
    \ and helps make it easier to detect potential errors in models.\n The <species>\
    \ with the id 'ALiver' does not have an 'initialConcentration' or 'initialAmount'\
    \ attribute, nor is its initial value set by an <initialAssignment> or <assignmentRule>.\n"
- level: error
  msg: "In situations where a mathematical expression refers to extent, the units\
    \ of extent should be consistent with the global extent units of the model. In\
    \ models where the 'extentUnits' attribute has not been declared, libSBML does\
    \ not yet have the functionality to verify accurately the consistency of the units\
    \ in such expressions. \n"
- level: error
  msg: "In situations where a mathematical expression refers to a compartment, species\
    \ or parameter, it is necessary to know the units of the object to establish unit\
    \ consistency. In models where the units of an object have not been declared,\
    \ libSBML does not yet have the functionality to accurately verify the consistency\
    \ of the units in mathematical expressions referring to that object. \n The units\
    \ of the <parameter> 'PappDONc' cannot be fully checked. Unit consistency reported\
    \ as either no errors or further unit errors related to this object may not be\
    \ accurate.\n"
- level: error
  msg: "If the attribute 'units' on a given Parameter object has not been set, then\
    \ the unit of measurement associated with that parameter's value is undefined.\n\
    Reference: L3V2 Section 4.7.3\n The <parameter> with id 'PappDONc' does not have\
    \ a 'units' attribute.\n"
- level: error
  msg: "When the 'variable' in an <assignmentRule> refers to a <parameter>, the units\
    \ of the rule's right-hand side are expected to be consistent with the units declared\
    \ for that parameter. \nReference: L3V2 Section 4.9.3\n  Expected units are litre\
    \ (exponent = 1, multiplier = 1, scale = 0) but the units returned by the <math>\
