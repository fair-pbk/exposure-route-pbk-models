unit_consistency:
- level: error
  msg: "In situations where a mathematical expression refers to extent, the units\
    \ of extent should be consistent with the global extent units of the model. In\
    \ models where the 'extentUnits' attribute has not been declared, libSBML does\
    \ not yet have the functionality to verify accurately the consistency of the units\
    \ in such expressions. \n"
- level: error
  msg: "When the 'variable' in an <assignmentRule> refers to a <parameter>, the units\
    \ of the rule's right-hand side are expected to be consistent with the units declared\
    \ for that parameter. \nReference: L3V2 Section 4.9.3\n  Expected units are litre\
    \ (exponent = 1, multiplier = 1, scale = 0) but the units returned by the <math>\
    \ expression of the <assignmentRule> with variable 'VL' are gram (exponent = 1,\
    \ multiplier = 1000, scale = 0).\n"
- level: error
  msg: "When the 'variable' in an <assignmentRule> refers to a <parameter>, the units\
    \ of the rule's right-hand side are expected to be consistent with the units declared\
    \ for that parameter. \nReference: L3V2 Section 4.9.3\n  Expected units are litre\
    \ (exponent = 1, multiplier = 1, scale = 0) but the units returned by the <math>\
    \ expression of the <assignmentRule> with variable 'VB' are gram (exponent = 1,\
    \ multiplier = 1000, scale = 0).\n"
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <assignmentRule> <math> expression '0.84 * BW - VL - VB' cannot be fully checked.\
    \ Unit consistency reported as either no errors or further unit errors related\
    \ to this object may not be accurate.\n"
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
    \ parameters whose units have not been declared, it is not possible to verify\
    \ accurately the consistency of the units in the expression. \n The units of the\
    \ <assignmentRule> <math> expression '15 * pow(BW, 0.74)' cannot be fully checked.\
    \ Unit consistency reported as either no errors or further unit errors related\
    \ to this object may not be accurate.\n"
- level: warning
  msg: "In situations where a mathematical expression contains literal numbers or\
